<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MORE | Destinations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
    <script defer type="module" src="./src/main.js"></script>
  </head>
  <body>
    <!-- STANDARD HEADER (SOLID BACKGROUND) -->
    <header class="site-header">
      <div class="home-header-left" style="flex:1; font-family: var(--font-h3-lead); font-size: 0.8rem; letter-spacing: 0.3em; text-transform: uppercase;">
        <span>MORE</span>
      </div>
      <div class="home-header-center" style="flex:1; display:flex; justify-content:center;">
        <a href="./index.html">
          <img src="./images/logo-dark.png" alt="MORE" style="height: 45px;" />
        </a>
      </div>
      <div class="home-header-right" style="flex:1; display:flex; justify-content:flex-end; align-items:center; gap:2rem;">
        <nav class="transparent-nav">
          <a href="./experiences.html" style="color:var(--graphite);">Expériences</a>
          <a href="./destinations.html" style="color:var(--graphite); opacity:1;">Destinations</a>
          <a href="./journal.html" style="color:var(--graphite);">Journal</a>
          <a href="./vision.html" style="color:var(--graphite);">About</a>
          <a href="./contact.html" class="transparent-inquire" style="border-color:var(--graphite); color:var(--graphite);">Inquire</a>
        </nav>
        <span class="home-hamburger" id="mobile-menu-open" style="color:var(--graphite);">≡</span>
      </div>
    </header>

    <!-- OVERLAY MENU (Mobile) -->
    <div class="overlay-menu" id="overlay-menu">
      <div class="mobile-menu-btn" id="mobile-menu-close" style="position:absolute; top:2.5rem; right:4vw;">Close</div>
      <a href="./experiences.html">Expériences</a>
      <a href="./destinations.html">Destinations</a>
      <a href="./journal.html">Journal</a>
      <a href="./vision.html">À propos</a>
      <a href="./contact.html">Inquire</a>
    </div>

    <!-- MOSAIC GRID (Full width, no margins) -->
    <main class="mosaic-wrapper">
      
      <!-- Row 1 -->
      <div class="mosaic-row">
        <!-- Amalfi Coast (Large) -->
        <a href="./product.html" class="mosaic-item span-large">
          <img src="./images/3.jpeg" alt="Amalfi Coast" />
          <h2>Amalfi Coast</h2>
        </a>
        
        <!-- Lake Como (Med) -->
        <a href="./product.html" class="mosaic-item span-med">
          <img src="./images/4.jpeg" alt="Lake Como" />
          <h2>Lake Como</h2>
        </a>

        <!-- Paris (Tall/Med) -->
        <a href="./product.html" class="mosaic-item span-tall">
          <img src="./images/6.jpeg" alt="Paris" />
          <h2>Paris</h2>
        </a>
      </div>

      <!-- Row 2 -->
      <div class="mosaic-row">
        <!-- Santorini (Med) -->
        <a href="./product.html" class="mosaic-item span-med">
          <img src="./images/5.jpeg" alt="Santorini" />
          <h2>Santorini</h2>
        </a>

        <!-- Provence (Med) -->
        <a href="./product.html" class="mosaic-item span-med">
          <img src="./images/7.jpeg" alt="Provence" />
          <h2>Provence</h2>
        </a>

        <!-- Marrakech (Large) -->
        <a href="./product.html" class="mosaic-item span-large">
          <img src="./images/8.jpeg" alt="Marrakech" />
          <h2>Marrakech</h2>
        </a>
      </div>

    </main>

  </body>
</html>
